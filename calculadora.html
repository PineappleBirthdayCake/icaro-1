    <main class="container bg-primary">
        <h1 class="text-light nombre-pagina">Calculadora</h1>
        <button type="button" class="btn"><a href="contenido.html" class="link-light link-underline-opacity-0">Volver a
                contenido</a></button>
        <hr class="text-light">
        <h5 class="text-light mb-0 ms-2">Calculadora de IMC</h5>
        <section>
            <div class="row m-2">
                <div class="col"> <label for="input-altura" class="form-label text-light">Altura (en metros)</label>
                    <input type="number" class="form-control" id="input-altura" value="1.70" step="0.01">
                </div>
                <div class="col"><label for="input-peso" class="form-label text-light">Peso (en kg)</label>
                    <input type="number" class="form-control" id="input-peso" value="60">
                </div>
            </div>
            <div class="row m-2" id="row-resultado-IMC">
                <div class="col">
                    <button type="button" class="btn text-light" id="calcular-IMC">Calcular</button>
                </div>
                <div class="col">
                    <h2 class="text-light" id="IMC-resultado">IMC:</h5>
                </div>
                <hr class="text-light mt-2">
            </div>
        </section>
