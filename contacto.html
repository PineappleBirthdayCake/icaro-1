      <form>
        <div class="mb-3">

        </div>

          <label for="exampleFormControlInput2" class="form-label text-light">Correo electrónico</label>
          <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="nombre@ejemplo.com">
        </div>
        <div class="mb-3">
          <label for="exampleFormControlTextarea1" class="form-label text-light">Mensaje</label>
          <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-dark mb-3">Enviar</button>
        </div>
      </form>
